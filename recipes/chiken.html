<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spicy Rapid Roast Chiken</title>
  <style>
    *{
      box-sizing: border-box;
    }
    body{
      max-width: 900px;
      width: 100%;
      margin: 8px auto;
      font-size: 1.3rem;
      line-height: 1.7;
    }
    .prep-time{
      display: grid;
      border: 2px solid rgb(97, 32, 32);
      grid-template-columns: repeat(2, 1fr);
      padding: 8px;
      margin: 8px;
    }
    .prep-content{
      padding: 8px;
      margin: 8px;
      text-align: center;

    }
    .prep-time .prep-content .front{
      font-weight: bold;
    }
    .prep-content{
      padding: 8px;
      margin: 8px;
    }
  </style>
</head>
<body>
  <h1>Spicy Rapid Roast Chiken</h1>
  <img src="https://www.allrecipes.com/thmb/g7jOhJFaM4WJ-h77cOOZyFA1qDo=/0x512/filters:no_upscale():max_bytes(150000):strip_icc():format(webp)/197357_SpicyRapidRoastChicken4x3-12a56fb0acf449e8a6ab1dfb9a2b7367.jpg" alt="fried chicken">

  <div class="prep-time">
    <div class="prep-content">
      <div class="front">Prep Time: </div>
      <div class="back">15 mins</div>
    </div>
  <div class="prep-content">
      <div class="front">Cook Time: </div>
      <div class="back">1 hr</div>
    </div>
    <div class="prep-content">
      <div class="front">Additional Time: </div>
      <div class="back">15 mins</div>
    </div>
    <div class="prep-content">
      <div class="front">Total Time: </div>
      <div class="back">1 hr 30 mins</div>
    </div>
    <div class="prep-content">
      <div class="front">Servings: </div>
      <div class="back">8</div>
    </div>
  </div>
</body>
</html>
